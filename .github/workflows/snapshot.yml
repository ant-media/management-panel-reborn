name: Snapshot

# Every push to any branch rebuilds the combined panel (legacy console + reborn) and refreshes ONE
# asset in the long-lived WORK-BRANCHES pre-release: panel-<slug>.zip, one per branch, clobbered in
# place. AMS branch/dev builds pull their branch's zip from a fixed, tokenless URL:
#   https://github.com/ant-media/management-panel-reborn/releases/download/WORK-BRANCHES/panel-<slug>.zip
# slug = branch name with every non-[A-Za-z0-9._-] char turned into '-' (master -> panel-master.zip).

on:
  push:
    branches: ['**']

permissions:
  contents: write

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Compute slug
        id: slug
        env:
          BRANCH: ${{ github.ref_name }}
        run: echo "slug=$(printf '%s' "$BRANCH" | sed 's/[^A-Za-z0-9._-]/-/g')" >> "$GITHUB_OUTPUT"

      - name: Build snapshot zip
        env:
          PANEL_CHANNEL: SNAPSHOT
          PANEL_COMMIT: ${{ github.sha }}
          PANEL_BRANCH: ${{ github.ref_name }}
          OUT_ZIP: panel-${{ steps.slug.outputs.slug }}.zip
        run: ./release.sh

      - name: Publish to WORK-BRANCHES pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view WORK-BRANCHES >/dev/null 2>&1; then
            gh release create WORK-BRANCHES --prerelease --title "Work branches" \
              --notes "Rolling per-branch panel builds: one panel-<slug>.zip per active branch, overwritten on every push. Not a release." || true
          fi
          gh release upload WORK-BRANCHES "panel-${{ steps.slug.outputs.slug }}.zip" --clobber
