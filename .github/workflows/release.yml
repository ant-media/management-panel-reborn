name: Release (draft)

# Manual, deliberate release. Enter a version (X.Y.Z, matching the AMS version you are cutting).
# Produces a DRAFT release v<version> with panel-release-<version>.zip attached and auto-generated
# notes. Edit the notes in the browser and Publish to cut it (that is when the git tag is created).
# AMS release builds pull v<version> from:
#   https://github.com/ant-media/management-panel-reborn/releases/download/v<version>/panel-release-<version>.zip

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, X.Y.Z (e.g. 2.4.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          v="${{ inputs.version }}"
          echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "error: version must be X.Y.Z (e.g. 2.4.3), got: '$v'"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Build release zip
        run: OUT_ZIP=panel-release-${{ inputs.version }}.zip ./release.sh

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            "panel-release-${{ inputs.version }}.zip" \
            --draft \
            --generate-notes \
            --target "$GITHUB_SHA" \
            --title "Release ${{ inputs.version }}"
