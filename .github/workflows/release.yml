name: Release (draft)

# Manual, deliberate release. The version is read from package.json (the single source of truth):
# bump it, commit, then run this workflow. Produces a DRAFT release v<version> with
# panel-release-<version>.zip attached and auto-generated notes. Edit the notes in the browser and
# Publish to cut it (that is when the git tag is created). AMS release builds pull v<version> from:
#   https://github.com/ant-media/management-panel-reborn/releases/download/v<version>/panel-release-<version>.zip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Read + validate version from package.json
        id: ver
        run: |
          v=$(node -p "require('./package.json').version")
          echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "error: package.json version must be X.Y.Z, got: '$v'"; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        env:
          PANEL_COMMIT: ${{ github.sha }}
          OUT_ZIP: panel-release-${{ steps.ver.outputs.version }}.zip
        run: ./release.sh

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            "panel-release-${{ steps.ver.outputs.version }}.zip" \
            --draft \
            --generate-notes \
            --target "$GITHUB_SHA" \
            --title "Release ${{ steps.ver.outputs.version }}"
