<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMS Admin Panel</title>
    <script>
      (() => {
        try {
          const raw = localStorage.getItem('ams.theme');
          if (!raw) return;
          const s = JSON.parse(raw);
          const dark = s.theme === 'dark' || (s.theme === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          const accents = {
            red:    'oklch(0.62 0.22 22)',
            blue:   'oklch(0.55 0.20 245)',
            green:  'oklch(0.58 0.16 150)',
            purple: 'oklch(0.55 0.20 305)',
            amber:  'oklch(0.72 0.17 70)',
          };
          if (s.accent && accents[s.accent]) document.documentElement.style.setProperty('--accent', accents[s.accent]);
          if (s.density === 'compact') document.documentElement.dataset.density = 'compact';
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
